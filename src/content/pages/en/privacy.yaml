id: privacy
tagline: "Security & Governance"
headline: "Data Protection & Privacy"
description: "Your privacy is paramount to the BioPortal Research Initiative. We operate under strict clinical, academic, and legal safeguards to keep your information secure. BioPortal strictly follows Canadian and Quebec healthcare privacy frameworks, which dictate rigorous methods for data security, collection, and participant collaboration."
safeguardsTitle: "Specific Safeguards We Enforce:"
safeguards:
  - title: "Double De-identification"
    desc: "We remove names, provincial health numbers (RAMQ), and all direct identifying information. Participants receive a unique identifier (UID) at the time of consent. Before any sample or data is accessed by researchers, a second code is applied, ensuring the material remains strictly unidentifiable."
  - title: "Legal Compliance"
    desc: "We adhere fully to Quebec's Law 25, provincial hospital regulations, and Canadian federal privacy frameworks for genomic and clinical data security."
  - title: "Ethics Board Oversight"
    desc: "All storage and distribution protocols are managed and vetted by institutional Research Ethics Boards (REBs)."
  - title: "Strict Access Control"
    desc: "Health data is stored on highly secure, siloed computing infrastructure, with strict multi-factor authentication tracking all access."
  - title: "Researcher Code of Conduct"
    desc: "To utilize data, investigators must: 1) sign legally binding data-use agreements explicitly promising never to attempt re-identification of any participant, and 2) provide institutional Research Ethics Board (REB) approval for their application."
footerBox:
  title: "Inquiries & Frameworks"
  desc: "For deeper insights into our core compliance structures, researchers and participants can reach out to our administration office at access.bioportal@ladydavis.ca."
