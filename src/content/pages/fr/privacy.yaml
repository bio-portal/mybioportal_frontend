id: privacy
tagline: "Sécurité et gouvernance"
headline: "Protection des données et vie privée"
description: "Votre vie privée est d'une importance capitale pour l'Initiative de recherche BioPortal. Nous opérons sous de strictes mesures de protection cliniques, académiques et juridiques pour assurer la sécurité de vos informations. BioPortal respecte rigoureusement les cadres canadiens et québécois de protection des renseignements personnels en santé, qui dictent des méthodes rigoureuses pour la sécurité, la collecte des données et la collaboration avec les participants."
safeguardsTitle: "Mesures de protection spécifiques appliquées :"
safeguards:
  - title: "Double dépersonnalisation"
    desc: "Nous retirons les noms, les numéros d'assurance maladie (RAMQ) et toutes les informations d'identification directe. Les participants reçoivent un identifiant unique (UID) au moment du consentement. Avant qu'un échantillon ou une donnée ne soit accessible aux chercheurs, un deuxième code est attribué, garantissant que le matériel reste strictement non identifiable."
  - title: "Conformité légale"
    desc: "Nous adhérons pleinement à la Loi 25 du Québec, aux réglementations hospitalières provinciales et aux cadres fédéraux canadiens de protection de la vie privée pour la sécurité des données génomiques et cliniques."
  - title: "Supervision par un comité d'éthique"
    desc: "Tous les protocoles de stockage et de distribution sont gérés et approuvés par des comités d'éthique de la recherche (CÉR) institutionnels."
  - title: "Contrôle d'accès strict"
    desc: "Les données de santé sont stockées sur des infrastructures informatiques cloisonnées et hautement sécurisées, avec une authentification multifacteur stricte qui trace tous les accès."
  - title: "Code de conduite des chercheurs"
    desc: "Pour utiliser les données, les chercheurs doivent : 1) signer des ententes d'utilisation des données juridiquement contraignantes, s'engageant explicitement à ne jamais tenter de réidentifier un participant, et 2) fournir l'approbation du comité d'éthique de la recherche (CÉR) de leur établissement pour leur demande."
footerBox:
  title: "Demandes d'information et cadres réglementaires"
  desc: "Pour en savoir plus sur nos structures de conformité de base, les chercheurs et les participants peuvent contacter notre bureau d'administration à access.bioportal@ladydavis.ca."
