dataRequest:
  pageTitle: "Accès aux données et cohortes | BioPortal"
  backText: "Retour à l'accueil"
  explorerCard:
    tag: "Plateforme interactive"
    title: "Explorateur de données en direct"
    description: "Visualisez en temps réel les cohortes cliniques, les distributions démographiques et les métriques d'échantillons grâce à notre passerelle. Filtrez et exportez des agrégats à la volée."
    buttonText: "Lancer l'explorateur"
  applicationProcess:
    title: "Processus de demande"
    description: "L'accès aux ensembles de données de BioPortal exige un alignement institutionnel strict. Veuillez consulter les exigences en matière d'infrastructure et télécharger le cadre de demande d'accès officiel ci-dessous."
    requirementsTitle: "Exigences"
    requirementsItems:
      - "Documentation du CÉR (Comité d'éthique de la recherche) approuvée par l'établissement et correspondant à la demande."
      - "Accord de transfert de données (ATD) ou contrats d'alignement institutionnel signés."
      - "Conformité au cadre d'attribution de la science ouverte de BioPortal."
    infrastructureTitle: "Vérification de l'infrastructure"
    infrastructureDescription: "L'infrastructure utilise notre plateforme de découverte interactive sur mesure et s'appuie sur les réseaux informatiques haute performance de l'<strong>Alliance de recherche numérique du Canada (AllianceCan)</strong>, ainsi que sur une grappe de calcul privée et sécurisée à l'<strong>Institut de recherche Lady Davis (IRLD)</strong>."
    infrastructureTags:
      - "Grappe privée IRLD"
      - "AllianceCan"
  actionBlock:
    title: "Demander l'accès aux données"
    description: "Téléchargez le formulaire officiel de demande d'accès aux données, obtenez toutes les signatures institutionnelles nécessaires, et soumettez le PDF finalisé à notre équipe administrative."
    downloadButtonText: "Télécharger le formulaire (.pdf)"
    emailLabel: "Soumettre les demandes complétées à :"
    emailAddress: "access.bioportal@ladydavis.ca"
