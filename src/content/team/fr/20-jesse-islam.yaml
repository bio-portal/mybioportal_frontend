bio: "Travaillant comme associé de recherche depuis 2026, Jesse conçoit et développe l'infrastructure numérique de BioPortal. Son rôle fait le pont entre le développement logiciel et la science des données, se spécialisant dans le développement web full-stack, l'automatisation des flux de travail et l'intégration de pipelines complexes de données multiomiques et de traitement du langage naturel (TLN). https://jesseislam.com/"
