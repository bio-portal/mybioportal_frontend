bio: "Shirlyn is a Nurse with over 20 years of healthcare experience and currently serves as a Research Coordinator at Bioportal. Her responsibilities include patient recruitment, obtaining informed consent, biospecimen collection, and maintaining accurate research documentation. She is dedicated to providing compassionate, safe, and patient-centred care and is committed to professionalism, teamwork, patient safety, and continuous learning."
