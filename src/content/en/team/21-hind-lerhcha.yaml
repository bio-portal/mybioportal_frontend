bio: "Dr. Lerhcha is a physician and clinical researcher with a Doctorate in Medicine from Abulcasis International University of Health Sciences and a Master’s degree in Biomedical Engineering from Polytechnique Montréal. At the Lady Davis Institute, she supports clinical research operations and interdisciplinary collaborations, bringing together scientific rigor, innovation, and patient care."
